<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Místico - Maio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ===== FUNDO ORIGINAL ===== */
body{
  font-family:'Cinzel','Playfair Display','Georgia',serif;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(138,43,226,0.4), transparent 50%),
    radial-gradient(circle at 30% 80%, rgba(255,215,0,0.3), transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(75,0,130,0.5), transparent 60%),
    #0a0a23;
  color:#fadb5d;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  overflow-y:auto;
  animation:mysticPulse 8s ease-in-out infinite alternate;
}

@keyframes mysticPulse{
  0%{filter:hue-rotate(0deg) brightness(1)}
  100%{filter:hue-rotate(20deg) brightness(1.05)}
}

/* ===== FUNDO MÁGICO ===== */
#magicBg{
  position:fixed;
  inset:0;
  z-index:-3;
}

/* ===== RESTANTE DO SEU DESIGN (INALTERADO) ===== */
.portal{
  width:100%;
  max-width:580px;
  margin:40px auto;
  background:linear-gradient(145deg,rgba(10,10,35,0.95),rgba(20,10,50,0.9));
  backdrop-filter:blur(25px);
  border:2px solid rgba(250,219,93,0.4);
  border-radius:32px;
  padding:48px;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.9),
    0 0 120px rgba(138,43,226,0.4);
}

h1{text-align:center;margin-bottom:24px;}
.subtitle{text-align:center;margin-bottom:48px;}

.semana{
  display:block;
  width:100%;
  margin-bottom:32px;
  padding:32px;
  border-radius:28px;
  text-decoration:none;
  color:#fadb5d;
  text-align:center;
  border:2px solid rgba(250,219,93,0.35);
}

.player{
  position:fixed;
  inset:0;
  background:rgba(5,5,25,0.98);
  display:none;
  align-items:flex-start;
  justify-content:center;
  z-index:10000;
}

.player.active{display:flex;}

.player-card{
  width:100%;
  max-width:560px;
  padding:24px;
  text-align:center;
}

audio{
  width:100%;
}
</style>
</head>

<body>

<canvas id="magicBg"></canvas>

<div class="portal">
  <h1>Portal Místico - Maio</h1>

  <p class="subtitle">
    Toda segunda-feira seus áudios semanais são liberados.<br>
    Sua leitura em áudio: voz Adria Freitas
  </p>

  <a href="#" data-audio="LINK_SEMANA1.mp3">
    <strong>1ª SEMANA</strong><br>27/04 a 04/05
  </a>

  <a href="#" data-audio="LINK_SEMANA2.mp3" class="semana">
    <strong>2ª SEMANA</strong><br>04/05 a 11/05
  </a>

  <a href="#" data-audio="LINK_SEMANA3.mp3" class="semana">
    <strong>3ª SEMANA</strong><br>11/05 a 18/05
  </a>

  <a href="#" data-audio="LINK_SEMANA4.mp3" class="semana">
    <strong>4ª SEMANA</strong><br>18/04 a 25/04
  </a>
</div>

<div class="player" id="player">
  <div class="player-card">
    <audio id="audioPlayer" controls></audio><br><br>
    <a href="javascript:closePlayer()">Voltar</a>
  </div>
</div>

<script>
/* ===== SEU PLAYER ORIGINAL ===== */
const semanas=document.querySelectorAll('.semana');
const player=document.getElementById('player');
const audio=document.getElementById('audioPlayer');

semanas.forEach(semana=>{
  semana.addEventListener('click',(e)=>{
    e.preventDefault();
    const audioSrc=semana.getAttribute('data-audio');

    if(audioSrc && !audioSrc.includes('LINK')){
      audio.src=audioSrc;
      player.classList.add('active');
      audio.load();
      audio.play().catch(()=>{});
    }
  });
});

function closePlayer(){
  player.classList.remove('active');
  audio.pause();
  audio.currentTime=0;
}

/* ===== FUNDO MÁGICO ===== */
const canvas = document.getElementById("magicBg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const stars=[];
for(let i=0;i<140;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*1.5,
    alpha:Math.random(),
    speed:Math.random()*0.02
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    s.alpha+=s.speed;
    if(s.alpha>1||s.alpha<0)s.speed*=-1;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,"+s.alpha+")";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

/* luas */
function createMoon(){
  const moon=document.createElement("div");
  moon.innerHTML="🌙";
  moon.style.position="fixed";
  moon.style.left=Math.random()*100+"vw";
  moon.style.top="100vh";
  moon.style.opacity="0.15";
  moon.style.fontSize="22px";
  moon.style.zIndex="-2";

  document.body.appendChild(moon);

  setTimeout(()=>{
    moon.style.transition="transform 12s linear, opacity 12s";
    moon.style.transform="translateY(-120vh)";
    moon.style.opacity="0";
  },50);

  setTimeout(()=>moon.remove(),12000);
}
setInterval(createMoon,5000);

/* estrela cadente */
function shootingStar(){
  const star=document.createElement("div");
  star.style.position="fixed";
  star.style.width="2px";
  star.style.height="2px";
  star.style.background="white";
  star.style.boxShadow="0 0 10px white";
  star.style.zIndex="-2";

  star.style.top=Math.random()*window.innerHeight*0.4+"px";
  star.style.left=Math.random()*window.innerWidth+"px";

  document.body.appendChild(star);

  setTimeout(()=>{
    star.style.transition="all 1s linear";
    star.style.transform="translate(300px,300px)";
    star.style.opacity="0";
  },10);

  setTimeout(()=>star.remove(),1000);
}
setInterval(shootingStar,6000);
</script>

</body>
</html>
