<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Místico - Abril</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Cinzel','Playfair Display','Georgia',serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(138,43,226,0.4), transparent 50%),
        radial-gradient(circle at 30% 80%, rgba(255,215,0,0.3), transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(75,0,130,0.5), transparent 60%),
        #0a0a23;
      color:#fadb5d;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;
      overflow-y:auto;
      animation:mysticPulse 8s ease-in-out infinite alternate;
    }
    @keyframes mysticPulse{
      0%{filter:hue-rotate(0deg) brightness(1)}
      100%{filter:hue-rotate(20deg) brightness(1.05)}
    }
    body::after{
      content:'';
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(1.5px 1.5px at 20px 30px, #fadb5d, transparent),
        radial-gradient(1px 1px at 80px 80px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.2px 1.2px at 120px 40px, #daa520, transparent),
        radial-gradient(0.8px 0.8px at 200px 120px, #fadb5d, transparent),
        radial-gradient(1px 1px at 300px 200px, rgba(138,43,226,0.6), transparent);
      background-repeat:repeat;
      background-size:400px 300px;
      animation:starsFloat 20s linear infinite;
      z-index:-1;
    }
    @keyframes starsFloat{
      from{transform:translateX(0) translateY(0)}
      to{transform:translateX(-50px) translateY(-50px)}
    }
    .portal{
      width:100%;
      max-width:580px;
      margin:40px auto;
      background:linear-gradient(145deg,rgba(10,10,35,0.95),rgba(20,10,50,0.9));
      backdrop-filter:blur(25px);
      border:2px solid rgba(250,219,93,0.4);
      border-radius:32px;
      padding:48px;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(250,219,93,0.3),
        0 0 120px rgba(138,43,226,0.4);
      position:relative;
      overflow:hidden;
      animation:portalGlow 4s ease-in-out infinite alternate;
    }
    @keyframes portalGlow{
      0%{box-shadow:0 32px 80px rgba(0,0,0,0.9),0 0 60px rgba(138,43,226,0.3)}
      100%{box-shadow:0 32px 80px rgba(0,0,0,0.9),0 0 100px rgba(138,43,226,0.5)}
    }
    .portal::before{
      content:"✦ 🃏 🪐 ✦";
      position:absolute;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      font-size:28px;
      color:rgba(250,219,93,0.8);
      letter-spacing:16px;
      animation:portalFloat 6s ease-in-out infinite;
      text-shadow:0 0 20px rgba(250,219,93,0.6);
    }
    @keyframes portalFloat{
      0%,100%{transform:translateX(-50%) translateY(0) scale(1)}
      50%{transform:translateX(-50%) translateY(-6px) scale(1.02)}
    }
    .astros{
      position:absolute;
      top:16px;
      right:24px;
      font-size:22px;
      opacity:0.8;
      animation:twinkle 3s ease-in-out infinite alternate;
    }
    @keyframes twinkle{
      0%{opacity:0.6;transform:scale(1)}
      100%{opacity:1;transform:scale(1.1)}
    }
    h1{
      font-size:clamp(30px,7vw,44px);
      text-align:center;
      margin-bottom:24px;
      background:linear-gradient(45deg,#fadb5d,#ffed4e,#daa520,#fadb5d);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:2px;
      font-weight:400;
    }
    .subtitle{
      font-size:clamp(17px,3.8vw,24px);
      text-align:center;
      margin-bottom:48px;
      color:#e6d4a8;
      line-height:1.6;
      text-shadow:0 2px 12px rgba(0,0,0,0.8);
    }
    .semana{
      display:block;
      width:100%;
      margin-bottom:32px;
      padding:32px 28px;
      background:linear-gradient(135deg,rgba(138,43,226,0.3),rgba(75,0,130,0.25));
      border:2px solid rgba(250,219,93,0.35);
      border-radius:28px;
      text-decoration:none;
      color:#fadb5d;
      transition:all .5s cubic-bezier(.25,.46,.45,.94);
      text-align:center;
      position:relative;
      overflow:hidden;
      box-shadow:0 12px 36px rgba(138,43,226,0.4);
    }
    .semana::before{
      content:"✦";
      position:absolute;
      top:-12px;
      left:50%;
      transform:translateX(-50%);
      font-size:28px;
      color:rgba(250,219,93,0.9);
      opacity:0.7;
    }
    .semana::after{
      content:"♃ ♀ ☿ ♅";
      position:absolute;
      bottom:16px;
      right:24px;
      font-size:18px;
      opacity:0.85;
      color:rgba(250,219,93,1);
    }
    .semana:hover{
      background:linear-gradient(135deg,rgba(138,43,226,0.45),rgba(75,0,130,0.4));
      transform:translateY(-12px) scale(1.04);
      border-color:rgba(250,219,93,0.7);
      box-shadow:0 28px 64px rgba(138,43,226,0.6),0 0 48px rgba(250,219,93,0.5);
    }
    .semana-num{
      font-size:clamp(24px,5.5vw,34px);
      font-weight:700;
      display:block;
      margin-bottom:16px;
      letter-spacing:2.5px;
      text-shadow:0 3px 16px rgba(250,219,93,0.8);
    }
    .semana-data{
      font-size:clamp(16px,3.5vw,22px);
      opacity:0.95;
      letter-spacing:1.5px;
      text-shadow:0 2px 12px rgba(0,0,0,0.8);
    }
    .player{
      position:fixed;
      inset:0;
      background:rgba(5,5,25,0.98);
      backdrop-filter:blur(20px);
      display:none;
      align-items:flex-start;
      justify-content:center;
      z-index:10000;
      padding:30px 20px 20px;
      overflow-y:auto;
    }
    .player.active{display:flex;}
    .player-card{
      width:100%;
      max-width:560px;
      background:linear-gradient(145deg,rgba(10,10,35,0.98),rgba(20,10,50,0.95));
      backdrop-filter:blur(35px);
      border:3px solid rgba(250,219,93,0.6);
      border-radius:36px;
      padding:24px 32px 24px;
      text-align:center;
      box-shadow:
        0 48px 96px rgba(0,0,0,0.98),
        0 0 140px rgba(138,43,226,0.5),
        inset 0 1px 0 rgba(250,219,93,0.3);
    }
    .player-title{
      font-size:clamp(26px,6vw,38px);
      margin-bottom:8px;
      background:linear-gradient(45deg,#fadb5d,#ffed4e,#daa520);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:2px;
    }
    .player-week{
      font-size:clamp(18px,4vw,26px);
      margin-bottom:8px;
      color:#e6d4a8;
      opacity:0.98;
      letter-spacing:1.8px;
    }
    audio{
      width:100%;
      margin:8px 0;
      border-radius:24px;
      box-shadow:0 12px 48px rgba(0,0,0,0.8);
    }
    .back-btn{
      display:inline-block;
      margin-top:12px;
      background:linear-gradient(135deg,rgba(138,43,226,0.8),rgba(75,0,130,0.7));
      color:#fadb5d;
      text-decoration:none;
      padding:14px 32px;
      border-radius:50px;
      font-weight:600;
      font-size:16px;
      border:2px solid rgba(250,219,93,0.4);
      transition:all .3s;
      box-shadow:0 8px 32px rgba(138,43,226,0.5);
    }
    .back-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 48px rgba(138,43,226,0.7);
    }
    @media(max-width:600px){
      html,body{height:auto!important;overflow-x:hidden;overflow-y:auto!important;}
      .portal{padding:28px 20px;margin:16px auto;border-radius:24px;}
      .portal::before{font-size:18px!important;letter-spacing:8px!important;top:16px;}
      .astros{top:10px!important;right:12px!important;font-size:16px!important;}
      h1{margin-top:40px;font-size:clamp(22px,6vw,32px);}
      .subtitle{font-size:clamp(14px,3.5vw,18px);margin-bottom:28px;}
      .semana{margin-bottom:20px!important;padding:24px 18px!important;border-radius:20px;}
      .semana-num{font-size:clamp(20px,5vw,28px);}
      .semana-data{font-size:clamp(14px,3.5vw,18px);}
      .player{padding:16px 12px!important;align-items:flex-start;}
      .player-card{padding:20px 16px!important;border-radius:24px;}
      audio{margin:6px 0!important;}
      .back-btn{padding:12px 24px;font-size:14px;margin-top:8px;}
    }
  </style>
</head>
<body>
  <div class="portal">
    <div class="astros">🪐✨🪐</div>
    <h1>Portal Místico - Abril</h1>
    <p class="subtitle">
      Toda segunda-feira seus áudios semanais são liberados.<br>
      Sua leitura em áudio: voz Adria Freitas
    </p>
    <a href="#" data-audio="SOM/VIVI_30.03.mp3" class="semana">
      <span class="semana-num">1ª SEMANA</span>
      <span class="semana-data">30/03 a 06/04</span>
    </a>
    <a href="#" data-audio="LINK_SEMANA2.mp3" class="semana">
      <span class="semana-num">2ª SEMANA</span>
      <span class="semana-data">06/04 a 13/04</span>
    </a>
    <a href="#" data-audio="LINK_SEMANA3.mp3" class="semana">
      <span class="semana-num">3ª SEMANA</span>
      <span class="semana-data">13/04 a 20/04</span>
    </a>
    <a href="#" data-audio="LINK_SEMANA4.mp3" class="semana">
      <span class="semana-num">4ª SEMANA</span>
      <span class="semana-data">20/04 a 27/04</span>
    </a>
  </div>
  <div class="player" id="player">
    <div class="player-card">
      <div class="player-title">Direcionamento Espiritual</div>
      <div class="player-week" id="playerWeek"></div>
      <audio id="audioPlayer" controls preload="metadata"></audio>
      <br>
      <a href="javascript:closePlayer()" class="back-btn">✦ Voltar ao Portal ✦</a>
    </div>
  </div>
  <script>
    const semanas=document.querySelectorAll('.semana');
    const player=document.getElementById('player');
    const audio=document.getElementById('audioPlayer');
    const playerWeek=document.getElementById('playerWeek');
    semanas.forEach(semana=>{
      semana.addEventListener('click',(e)=>{
        e.preventDefault();
        const audioSrc=semana.getAttribute('data-audio');
        if(audioSrc&&!audioSrc.includes('LINK_')){
          audio.src=audioSrc;
          playerWeek.textContent=semana.querySelector('.semana-num').textContent+' • '+semana.querySelector('.semana-data').textContent;
          player.classList.add('active');
          audio.load();
          audio.play().catch(()=>{});
        }
      });
    });
    function closePlayer(){
      player.classList.remove('active');
      audio.pause();
      audio.currentTime=0;
    }
    player.addEventListener('click',(e)=>{if(e.target===player)closePlayer();});
  </script>
</body>
</html>
